<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA BASE DPC BEKASI</title>
    <!-- Font & Icon Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #1e293b;
            --accent-blue: #0284c7;
            --white: #ffffff;
            --bg-global: #f8fafc;
            --border-color: #cbd5e1;
            
            /* Warna Tema Sesuai Gambar Excel */
            --color-camit: #f1f5f9;
            --color-survey: #fef08a;
            --color-mitra: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-global);
            color: #334155;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        /* ==================== SCREEN 1: LOGIN BANNER ==================== */
        #login-screen {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .login-box p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-blue);
        }

        .btn-submit-login {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-blue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit-login:hover {
            background-color: #0369a1;
        }

        .error-text {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            font-weight: 500;
        }

        /* ==================== SCREEN 2: MAIN DASHBOARD ==================== */
        header {
            background-color: #0f172a;
            color: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        header h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .btn-logout {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Menu Navigasi Tab Kategori */
        .tab-navigation {
            display: flex;
            background: #e2e8f0;
            margin: 20px 30px 0 30px;
            border-radius: 10px;
            padding: 5px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .tab-btn.active[data-tab="camit"] { background-color: #cbd5e1; color: #0f172a; }
        .tab-btn.active[data-tab="survey"] { background-color: #eab308; color: #0f172a; }
        .tab-btn.active[data-tab="mitra"] { background-color: #22c55e; color: white; }

        /* Form Area Input */
        .form-container {
            background: var(--white);
            margin: 20px 30px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .form-container h3 {
            margin-bottom: 20px;
            font-size: 16px;
            border-left: 4px solid var(--accent-blue);
            padding-left: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
        }

        .form-field label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #64748b;
        }

        .form-field input, .form-field select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            font-size: 13px;
        }

        .btn-insert {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Database Table Area */
        .table-container {
            background: var(--white);
            margin: 0 30px 40px 30px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        .table-container h3 {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1000px;
        }

        th {
            background-color: #334155;
            color: white;
            padding: 12px 10px;
            font-weight: 600;
            text-align: left;
            border: 1px solid #475569;
        }

        td {
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        /* Custom Baris Berdasarkan Kategori Sesuai Gambar */
        .row-camit { background-color: var(--color-camit); }
        .row-survey { background-color: var(--color-survey); }
        .row-mitra { background-color: var(--color-mitra); }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ==================== 1. SCREEN LOGIN ==================== -->
    <div id="login-screen">
        <div class="login-box">
            <h1>DATA BASE DPC BEKASI</h1>
            <p>Sistem Penginputan Data Mitra Internal</p>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>
            
            <button class="btn-submit-login" onclick="loginProses()">MASUK SISTEM</button>
            <div id="error-msg" class="error-text hidden">Kombinasi salah! Hubungi IT Center.</div>
        </div>
    </div>


    <!-- ==================== 2. SCREEN UTAMA/DASHBOARD ==================== -->
    <div id="main-screen" class="hidden">
        <header>
            <h2>DATA BASE DPC BEKASI</h2>
            <button class="btn-logout" onclick="logoutProses()">Sistem Logout <i class="fa-solid fa-right-from-bracket"></i></button>
        </header>

        <!-- Navigasi Kategori Data -->
        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="camit" onclick="switchTab('camit')">DATA CAMIT DPC BEKASI</button>
            <button class="tab-btn" data-tab="survey" onclick="switchTab('survey')">DATA SURVEY</button>
            <button class="tab-btn" data-tab="mitra" onclick="switchTab('mitra')">DATA MITRA DPC BEKASI</button>
        </div>

        <!-- Master Form Input Satu Tempat -->
        <div class="form-container">
            <h3 id="form-title">Form Input: Data Camit DPC Bekasi</h3>
            <div class="form-grid">
                <div class="form-field">
                    <label>Tanggal / Terima</label>
                    <input type="date" id="inp-tanggal">
                </div>
                <div class="form-field">
                    <label>Nama Mitra / Pemohon</label>
                    <input type="text" id="inp-nama" placeholder="Contoh: Harun Al Rasyid">
                </div>
                <div class="form-field">
                    <label>NIK KTP</label>
                    <input type="number" id="inp-nik" placeholder="16 Digit NIK KTP">
                </div>
                <div class="form-field">
                    <label>Referensi</label>
                    <input type="text" id="inp-referensi" placeholder="Referensi">
                </div>
                <div class="form-field">
                    <label>No Polisi</label>
                    <input type="text" id="inp-nopol" placeholder="Contoh: B 1234 ABC">
                </div>
                <div class="form-field">
                    <label>Unit Permohonan</label>
                    <input type="text" id="inp-unit" placeholder="Contoh: ATTO 1 / Terios">
                </div>
                <div class="form-field">
                    <label>Program</label>
                    <input type="text" id="inp-program" placeholder="Contoh: Kota">
                </div>
                <div class="form-field">
                    <label>Status</label>
                    <input type="text" id="inp-status" placeholder="Contoh: Aktif">
                </div>
                <div class="form-field">
                    <label>No Handphone</label>
                    <input type="text" id="inp-nohp" placeholder="Contoh: 0812xxxx">
                </div>
                <div class="form-field">
                    <label>Alamat Lengkap</label>
                    <input type="text" id="inp-alamat" placeholder="Jl. Raya Bekasi No...">
                </div>
                <div class="form-field">
                    <label>Keterangan</label>
                    <input type="text" id="inp-keterangan" placeholder="Contoh: Sudah Survey">
                </div>
            </div>
            <button class="btn-insert" onclick="simpanDataKategori()">Simpan & Masukkan ke Tabel</button>
        </div>

        <!-- Section Tabel Hasil Database -->
        <div class="table-container">
            <h3 id="table-view-title">DAFTAR CALON MITRA DPC ORASKI BEKASI RAYA</h3>
            <table id="main-data-table">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Tanggal/Terima</th>
                        <th>Nama</th>
                        <th>NIK KTP</th>
                        <th>Referensi</th>
                        <th>No Pol</th>
                        <th>Unit</th>
                        <th>Program</th>
                        <th>Status</th>
                        <th>No HP</th>
                        <th>Alamat</th>
                        <th>Keterangan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-body-render">
                    <!-- Data Ter-render Otomatis Disini -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- ==================== LOGIKA CORE SYSTEM ==================== -->
    <script>
        // Set Default Kategori Aktif
        let currentActiveTab = 'camit';

        // Memory State Array Induk (Mengambil data lama dari LocalStorage jika ada)
        let db_camit = JSON.parse(localStorage.getItem('db_camit')) || [];
        let db_survey = JSON.parse(localStorage.getItem('db_survey')) || [];
        let db_mitra = JSON.parse(localStorage.getItem('db_mitra')) || [];

        // Proteksi System - Cek Login State saat reload
        window.onload = function() {
            if (localStorage.getItem('isAuth') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                switchTab('camit'); // Tampilan pertama kali
            }
        }

        // Fungsi Autentikasi Login
        function loginProses() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('error-msg');

            // Akun Default Akses Admin
            if (user === "admin" && pass === "bekasi") {
                localStorage.setItem('isAuth', 'true');
                err.classList.add('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                switchTab('camit');
            } else {
                err.classList.remove('hidden');
            }
        }

        // Fungsi Logout
        function logoutProses() {
            localStorage.removeItem('isAuth');
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        // Mekanisme Pindah Navigasi Tab Kategori
        function switchTab(kategori) {
            currentActiveTab = kategori;
            
            // Set active class tombol
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${kategori}"]`).classList.add('active');

            // Set Judul Form & Tabel Sesuai Gambar Request
            const formTitle = document.getElementById('form-title');
            const tableTitle = document.getElementById('table-view-title');

            if (kategori === 'camit') {
                formTitle.innerText = "Form Input: DATA CALON MITRA DPC BEKASI";
                tableTitle.innerText = "DAFTAR CALON MITRA DPC ORASKI BEKASI RAYA";
            } else if (kategori === 'survey') {
                formTitle.innerText = "Form Input: DATA SURVEY PERMOHONAN";
                tableTitle.innerText = "DATA SURVEY PERMOHONAN UNIT DPC ORASKI BEKASI RAYA";
            } else if (kategori === 'mitra') {
                formTitle.innerText = "Form Input: DATA MITRA DPC BEKASI";
                tableTitle.innerText = "DAFTAR MITRA AKTIF DPC ORASKI BEKASI RAYA";
            }

            renderDataToTable();
        }

        // Ambil Data Form & Simpan Sesuai Tab Aktif
        function simpanDataKategori() {
            const dataBaru = {
                id: Date.now(),
                tanggal: document.getElementById('inp-tanggal').value || '-',
                nama: document.getElementById('inp-nama').value || '-',
                nik: document.getElementById('inp-nik').value || '-',
                referensi: document.getElementById('inp-referensi').value || '-',
                nopol: document.getElementById('inp-nopol').value || '-',
                unit: document.getElementById('inp-unit').value || '-',
                program: document.getElementById('inp-program').value || '-',
                status: document.getElementById('inp-status').value || '-',
                nohp: document.getElementById('inp-nohp').value || '-',
                alamat: document.getElementById('inp-alamat').value || '-',
                keterangan: document.getElementById('inp-keterangan').value || '-'
            };

            // Masukkan data ke array penampung yang tepat
            if (currentActiveTab === 'camit') {
                db_camit.push(dataBaru);
                localStorage.setItem('db_camit', JSON.stringify(db_camit));
            } else if (currentActiveTab === 'survey') {
                db_survey.push(dataBaru);
                localStorage.setItem('db_survey', JSON.stringify(db_survey));
            } else if (currentActiveTab === 'mitra') {
                db_mitra.push(dataBaru);
                localStorage.setItem('db_mitra', JSON.stringify(db_mitra));
            }

            // Reset semua field form sehabis input agar mempermudah entri berikutnya
            document.querySelectorAll('.form-field input').forEach(input => input.value = '');
            
            // Render ulang tabel agar data langsung muncul otomatis tanpa refresh
            renderDataToTable();
        }

        // Hapus Item Data Tertentu
        function hapusDataRow(id) {
            if (confirm("Apakah anda yakin ingin menghapus data ini?")) {
                if (currentActiveTab === 'camit') {
                    db_camit = db_camit.filter(item => item.id !== id);
                    localStorage.setItem('db_camit', JSON.stringify(db_camit));
                } else if (currentActiveTab === 'survey') {
                    db_survey = db_survey.filter(item => item.id !== id);
                    localStorage.setItem('db_survey', JSON.stringify(db_survey));
                } else if (currentActiveTab === 'mitra') {
                    db_mitra = db_mitra.filter(item => item.id !== id);
                    localStorage.setItem('db_mitra', JSON.stringify(db_mitra));
                }
                renderDataToTable();
            }
        }

        // Membaca Array Dan Membuat Baris Kotak Tabel Baru Otomatis (Rendering)
        function renderDataToTable() {
            const tbody = document.getElementById('table-body-render');
            tbody.innerHTML = ''; // Kosongkan tampilan lama
            
            let targetArray = [];
            let targetRowClass = '';

            if (currentActiveTab === 'camit') {
                targetArray = db_camit;
                targetRowClass = 'row-camit';
            } else if (currentActiveTab === 'survey') {
                targetArray = db_survey;
                targetRowClass = 'row-survey';
            } else if (currentActiveTab === 'mitra') {
                targetArray = db_mitra;
                targetRowClass = 'row-mitra';
            }

            if (targetArray.length === 0) {
                tbody.innerHTML = `<tr><td colspan="13" style="text-align:center; background: #fff; color: #94a3b8;">Belum ada data terinput untuk kategori ini.</td></tr>`;
                return;
            }

            targetArray.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = targetRowClass; // Mengaplikasikan background warna khas per-tabel sesuai excel
                
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.tanggal}</td>
                    <td style="font-weight:600;">${item.nama}</td>
                    <td>${item.nik}</td>
                    <td>${item.referensi}</td>
                    <td>${item.nopol}</td>
                    <td>${item.unit}</td>
                    <td>${item.program}</td>
                    <td>${item.status}</td>
                    <td>${item.nohp}</td>
                    <td>${item.alamat}</td>
                    <td>${item.keterangan}</td>
                    <td>
                        <button class="btn-delete" onclick="hapusDataRow(${item.id})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
