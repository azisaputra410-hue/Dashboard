<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Judul Game Modern di Atas Browser -->
    <title>CYBER PULSE: Neon Overdrive</title>
    <style>
        :root {
            --bg-dark: #05050a;
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff007f;
            --neon-green: #39ff14;
            --panel-border: rgba(0, 240, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0;
        }

        /* Container Utama Pas Satu Layar HP */
        #game-viewport {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            max-height: 850px;
            background: radial-gradient(circle at center, #100a1c 0%, #05050a 100%);
            border: 2px solid var(--panel-border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Skor & Interface Atas */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(5,5,10,0.8), rgba(0,0,0,0));
        }

        .score-box {
            display: flex;
            flex-direction: column;
        }

        .score-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-cyan);
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .combo-container {
            text-align: right;
        }

        .combo-value {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--neon-magenta);
            text-shadow: 0 0 12px var(--neon-magenta);
            transform: scale(1);
            transition: transform 0.05s ease;
        }

        .combo-value.pop {
            transform: scale(1.3);
        }

        /* Energy Bar untuk Overdrive */
        #energy-wrapper {
            width: 90%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto;
            border-radius: 3px;
            overflow: hidden;
            z-index: 10;
            position: relative;
        }

        #energy-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            box-shadow: 0 0 10px var(--neon-magenta);
            transition: width 0.1s linear;
        }

        /* Arena Utama Tempat Spawn Target Objek (Mekanik Manual) */
        #play-field {
            flex: 1;
            position: relative;
            width: 100%;
        }

        /* Target Lingkaran Ketuk (Tap Target) */
        .tap-target {
            position: absolute;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
        }

        /* Inti Target Tengah */
        .target-core {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--neon-cyan);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Cincin Waktu Menyusut (Mekanik Ketepatan) */
        .approach-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            top: 0;
            left: 0;
            box-shadow: 0 0 8px var(--neon-cyan);
            animation: shrinkRing 1.2s linear forwards;
        }

        @keyframes shrinkRing {
            from { transform: scale(2.2); opacity: 0.3; }
            to { transform: scale(0.6); opacity: 1; }
        }

        /* Target Swipe (Panah Geser) */
        .swipe-target {
            position: absolute;
            width: 90px;
            height: 90px;
            transform: translate(-50%, -50%);
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swipe-arrow {
            font-size: 2rem;
            font-weight: bold;
            color: var(--neon-magenta);
            text-shadow: 0 0 15px var(--neon-magenta);
            animation: pulseArrow 0.4s infinite alternate;
        }

        @keyframes pulseArrow {
            from { transform: scale(0.9); }
            to { transform: scale(1.2); }
        }

        /* Tombol Picu Overdrive Super Keren */
        #overdrive-trigger {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-weight: 800;
            letter-spacing: 3px;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 1rem;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.1);
            opacity: 0.3;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        #overdrive-trigger.ready {
            opacity: 1;
            pointer-events: auto;
            background: rgba(57, 255, 20, 0.1);
            box-shadow: 0 0 20px var(--neon-green);
            animation: borderPulse 1s infinite alternate;
        }

        @keyframes borderPulse {
            from { box-shadow: 0 0 10px var(--neon-green); }
            to { box-shadow: 0 0 25px var(--neon-green), inset 0 0 10px var(--neon-green); }
        }

        /* Screen Flash / Efek Saat Hit Negatif atau Positif Luar Biasa */
        .flash-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
        }

        /* Layar Pembuka / Game Over */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.95);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        .screen-overlay h2 {
            font-size: 2.2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            margin-bottom: 10px;
            font-weight: 900;
        }

        .screen-overlay p {
            font-size: 0.9rem;
            color: #8a8a9e;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .start-btn {
            padding: 14px 40px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
        }

        /* Hit Rating Text Effect (Perfect, Good, Miss) */
        .rating-text {
            position: absolute;
            transform: translate(-50%, -50%);
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 8;
            animation: ratingFly 0.5s ease-out forwards;
        }

        @keyframes ratingFly {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            30% { transform: translate(-50%, -70%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -90%) scale(1); }
        }

        /* Efek Mode Overdrive Sedang Aktif di Seluruh Layar */
        #game-viewport.overdrive-active {
            animation: screenShake 0.1s infinite alternate;
            border-color: var(--neon-green) !important;
        }
        
        #game-viewport.overdrive-active .target-core {
            background: var(--neon-green) !important;
            box-shadow: 0 0 20px var(--neon-green) !important;
        }

        @keyframes screenShake {
            from { transform: translate(1px, 1px); }
            to { transform: translate(-1px, -1px); }
        }
    </style>
</head>
<body>

    <div id="game-viewport">
        <!-- Efek Kilatan Background -->
        <div id="flash-screen" class="flash-effect"></div>

        <!-- Tampilan HUD / Atas Layar -->
        <header>
            <div class="score-box">
                <span class="score-label">Score Matrix</span>
                <span class="score-value" id="score-display">000000</span>
            </div>
            <div class="combo-container">
                <span class="score-label" style="color: var(--neon-magenta)">Combo</span>
                <div class="combo-value" id="combo-display">0</div>
            </div>
        </header>

        <!-- Bar Energi Pengumpul Manual -->
        <div id="energy-wrapper">
            <div id="energy-bar"></div>
        </div>

        <!-- Zona Tempur Utama Manual -->
        <div id="play-field"></div>

        <!-- Tombol Aksi Overdrive -->
        <button id="overdrive-trigger" onclick="activateOverdrive()">Overdrive Ready</button>

        <!-- Layar Mulai / Kalah Menu -->
        <div id="menu-overlay" class="screen-overlay">
            <h2 id="menu-title">CYBER PULSE</h2>
            <p id="menu-desc">Ketuk target lingkaran tepat waktu saat cincin menyusut pas di tengah. Usap (*Swipe*) panah merah sesuai arahnya! Pertahankan refleks tanganmu.</p>
            <button class="start-btn" onclick="startGame()">INITIALIZE MECHANICS</button>
        </div>
    </div>

    <script>
        const playField = document.getElementById("play-field");
        const scoreDisplay = document.getElementById("score-display");
        const comboDisplay = document.getElementById("combo-display");
        const energyBar = document.getElementById("energy-bar");
        const overdriveBtn = document.getElementById("overdrive-trigger");
        const menuOverlay = document.getElementById("menu-overlay");
        const viewport = document.getElementById("game-viewport");
        const flashScreen = document.getElementById("flash-screen");

        let score = 0;
        let combo = 0;
        let energy = 0;
        let isPlaying = false;
        let isOverdrive = false;
        let spawnInterval;
        let gameLoopSpeed = 1000; // milidetik
        let activeTargets = [];

        // Inisialisasi Deteksi Geser Layar HP (Swipe Mechanics)
        let touchStartX = 0;
        let touchStartY = 0;

        function startGame() {
            score = 0;
            combo = 0;
            energy = 0;
            isPlaying = true;
            isOverdrive = false;
            gameLoopSpeed = 1000;
            activeTargets = [];
            playField.innerHTML = "";
            
            scoreDisplay.innerText = "000000";
            comboDisplay.innerText = "0";
            energyBar.style.width = "0%";
            overdriveBtn.classList.remove("ready");
            viewport.classList.remove("overdrive-active");

            menuOverlay.style.display = "none";
            
            // Pemicu Spawn Objek Manual secara berkala
            clearInterval(spawnInterval);
            gameLoop = setInterval(() => {
                if(isPlaying) {
                    // Acak memunculkan antara Klik Biasa (Tap) atau Geser (Swipe)
                    if(Math.random() > 0.35) {
                        spawnTapTarget();
                    } else {
                        spawnSwipeTarget();
                    }
                }
            }, gameLoopSpeed);
        }

        // MEKANIK 1: Membuat Target Ketukan (Tap Target)
        function spawnTapTarget() {
            const target = document.createElement("div");
            target.className = "tap-target";
            
            // Mengatur koordinat acak di layar HP agar menantang
            const x = Math.random() * 70 + 15; // Jangkauan 15% - 85% lebar layar
            const y = Math.random() * 65 + 15; // Jangkauan 15% - 80% tinggi layar
            target.style.left = `${x}%`;
            target.style.top = `${y}%`;

            const core = document.createElement("div");
            core.className = "target-core";

            const ring = document.createElement("approach-ring");
            ring.className = "approach-ring";

            target.appendChild(core);
            target.appendChild(ring);
            playField.appendChild(target);

            let startTime = Date.now();
            let hitTriggered = false;

            // Kejadian saat User Mengetuk secara Manual
            target.addEventListener("touchstart", (e) => {
                e.preventDefault();
                if(hitTriggered) return;
                hitTriggered = true;

                let clickTime = Date.now();
                let elapsed = clickTime - startTime;
                
                // Menghitung akurasi ketukan manual (Akurasi Terbaik di kisaran 1000-1150ms)
                if (elapsed >= 950 && elapsed <= 1200) {
                    triggerHit("PERFECT", x, y);
                } else if (elapsed > 500 && elapsed < 950) {
                    triggerHit("GOOD", x, y);
                } else {
                    triggerHit("MISS", x, y);
                }
                
                target.remove();
            });

            // Batas Waktu jika User Lambat Mengetuk (Auto Miss)
            setTimeout(() => {
                if(!hitTriggered) {
                    triggerHit("MISS", x, y);
                    target.remove();
                }
            }, 1200);
        }

        // MEKANIK 2: Membuat Target Usapan Panah (Swipe Target)
        function spawnSwipeTarget() {
            const target = document.createElement("div");
            target.className = "swipe-target";
            
            const x = Math.random() * 60 + 20;
            const y = Math.random() * 60 + 20;
            target.style.left = `${x}%`;
            target.style.top = `${y}%`;

            const directions = ["↑", "↓", "→", "←"];
            const chosenDir = directions[Math.floor(Math.random() * directions.length)];

            const arrow = document.createElement("div");
            arrow.className = "swipe-arrow";
            arrow.innerText = chosenDir;

            target.appendChild(arrow);
            playField.appendChild(target);

            let hitTriggered = false;

            // Menangkap Awal Koordinat Jari Menyentuh Layar HP
            target.addEventListener("touchstart", (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            // Menangkap Arah Geseran Jari Saat Dilepas (Swipe Detection)
            target.addEventListener("touchend", (e) => {
                if(hitTriggered) return;
                
                let touchEndX = e.changedTouches[0].clientX;
                let touchEndY = e.changedTouches[0].clientY;

                let diffX = touchEndX - touchStartX;
                let diffY = touchEndY - touchStartY;
                
                let detectedDir = "";

                // Menentukan Logika Arah Geser Terkuat
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    detectedDir = diffX > 0 ? "→" : "←";
                } else {
                    detectedDir = diffY > 0 ? "↓" : "↑";
                }

                if (detectedDir === chosenDir && (Math.abs(diffX) > 30 || Math.abs(diffY) > 30)) {
                    triggerHit("PERFECT SWIPE", x, y);
                    hitTriggered = true;
                    target.remove();
                } else {
                    triggerHit("MISS", x, y);
                    hitTriggered = true;
                    target.remove();
                }
            });

            // Waktu kedaluwarsa panah
            setTimeout(() => {
                if(!hitTriggered) {
                    triggerHit("MISS", x, y);
                    target.remove();
                }
            }, 1500);
        }

        // SISTEM PENILAIAN & AKURASI LANGSUNG
        function triggerHit(rating, x, y) {
            const ratingText = document.createElement("div");
            ratingText.className = "rating-text";
            ratingText.style.left = `${x}%`;
            ratingText.style.top = `${y}%`;
            
            let pointGain = 0;

            if (rating.includes("PERFECT")) {
                ratingText.style.color = "var(--neon-cyan)";
                combo++;
                pointGain = isOverdrive ? 500 : 250;
                energy = Math.min(100, energy + 8);
                popComboUI();
            } else if (rating === "GOOD") {
                ratingText.style.color = "var(--neon-green)";
                combo++;
                pointGain = isOverdrive ? 200 : 100;
                energy = Math.min(100, energy + 4);
                popComboUI();
            } else { // MISS
                ratingText.style.color = "var(--neon-magenta)";
                combo = 0;
                energy = Math.max(0, energy - 15);
                triggerFlashEffect("rgba(255, 0, 127, 0.2)");
                
                // Mengurangi nyawa/skor secara bertahap jika banyak miss
                score = Math.max(0, score - 50);
            }

            score += pointGain;
            scoreDisplay.innerText = String(score).padStart(6, '0');
            comboDisplay.innerText = combo;
            energyBar.style.width = `${energy}%`;

            // Update Judul atas Pencarian Browser secara real-time berdasarkan skor tertinggi
            document.title = `⚡ SCORE: ${score} | CYBER PULSE`;

            ratingText.innerText = rating;
            playField.appendChild(ratingText);
            setTimeout(() => ratingText.remove(), 500);

            // Validasi Kesiapan Fitur Overdrive Modus Aktif
            if(energy >= 100 && !isOverdrive) {
                overdriveBtn.classList.add("ready");
            } else if(energy < 100 && !isOverdrive) {
                overdriveBtn.classList.remove("ready");
            }
        }

        function popComboUI() {
            comboDisplay.classList.add("pop");
            setTimeout(() => comboDisplay.classList.remove("pop"), 50);
        }

        function triggerFlashEffect(color) {
            flashScreen.style.backgroundColor = color;
            flashScreen.style.opacity = "1";
            setTimeout(() => flashScreen.style.opacity = "0", 150);
        }

        // MEKANIK ULTIMATE: Aktivasi Mode Overdrive Secara Manual
        function activateOverdrive() {
            if(energy < 100 || isOverdrive) return;
            
            isOverdrive = true;
            overdriveBtn.classList.remove("ready");
            overdriveBtn.innerText = "OVERDRIVE ACTIVE (2X POINTS)";
            viewport.classList.add("overdrive-active");
            triggerFlashEffect("rgba(57, 255, 20, 0.4)");

            // Pengkondisian tempo game dipercepat instan agar adrenalin meningkat
            clearInterval(spawnInterval);
            gameLoopSpeed = 500; // Spawn objek 2x lipat lebih cepat!
            
            // Menguras energi overdrive secara bertahap selama 8 detik penuh
            let drainInterval = setInterval(() => {
                energy -= 1.25;
                energyBar.style.width = `${Math.max(0, energy)}%`;
                
                if(energy <= 0) {
                    clearInterval(drainInterval);
                    isOverdrive = false;
                    overdriveBtn.innerText = "Overdrive Ready";
                    viewport.classList.remove("overdrive-active");
                    gameLoopSpeed = 1000;
                }
            }, 100);
        }

        // Logika Mengakhiri Game secara Taktis
        function gameOver() {
            isPlaying = false;
            clearInterval(spawnInterval);
            document.getElementById("menu-title").innerText = "MATRIX OVERLOAD";
            document.getElementById("menu-desc").innerText = `Koneksi terputus! Total Rekor Sinkronisasi Skor Kamu: ${score} Poin. Mau coba pecahkan rekor lagi?`;
            menuOverlay.style.display = "flex";
        }
    </script>
</body>
</html>
